<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia AI - Vulnerability Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style2.css">
    <script src="/static/script2.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans antialiased">

    <!-- Header with back button -->
    <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Sofia AI Scanner</h1>
            </div>
            <div class="text-sm text-gray-500 dark:text-gray-400" id="scan-limit-info">Scans left today: 1</div>
        </div>
    </header>

    <!-- Main content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 space-y-6">

            <!-- URL Input -->
            <div>
                <label for="scan-url" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Target URL</label>
                <input type="url" id="scan-url" placeholder="https://example.com" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- Start Button -->
            <div class="flex items-center justify-between">
                <button id="start-scan-btn" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed font-medium">Start Scan</button>
                <p class="text-sm text-gray-500 dark:text-gray-400">Free users: 1 scan/day</p>
            </div>

            <!-- Progress Bar -->
            <div id="scan-progress-container" class="hidden space-y-2">
                <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700">
                    <div id="scan-progress-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="scan-status" class="text-sm text-gray-600 dark:text-gray-400">Initializing...</p>
            </div>

            <!-- AI Commentary Log -->
            <div id="scan-log" class="hidden bg-gray-50 dark:bg-gray-900 rounded-lg p-4 max-h-48 overflow-y-auto font-mono text-sm border border-gray-200 dark:border-gray-700 space-y-1"></div>

            <!-- Results Area -->
            <div id="scan-results" class="hidden space-y-4">
                <h2 class="text-xl font-semibold border-b border-gray-200 dark:border-gray-700 pb-2">Results</h2>
                <div id="results-list" class="space-y-3"></div>
            </div>

        </div>
    </main>

    <script src="script2.js"></script>
</body>
</html>
